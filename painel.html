<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Placar Responsivo - Yoshi 2026</title>
    <style>
        @font-face {
            font-family: 'Digital-7';
            src: url('https://fonts.cdnfonts.com/s/14352/Digital7-rg18.woff') format('woff');
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Topo: Adaptável */
        .top-bar {
            width: 95%;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .champ-name {
            background: rgba(20, 20, 20, 0.9);
            padding: 5px 20px;
            border-radius: 8px 8px 0 0;
            font-size: 1.5vw; /* Tamanho relativo à largura */
            border: 1px solid #444;
            text-transform: uppercase;
        }

        .teams-header {
            display: flex;
            width: 100%;
            height: 8vh; /* Altura relativa à tela */
            align-items: center;
            justify-content: center;
        }

        .name-box {
            flex: 1;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 2.5vw;
            font-weight: 900;
            text-transform: uppercase;
        }

        .home-box { background: linear-gradient(90deg, #e53935, #8e0000); border-radius: 10px 0 0 10px; }
        .away-box { background: linear-gradient(90deg, #1565c0, #0d47a1); border-radius: 0 10px 10px 0; justify-content: flex-end; }
        
        .vs-box {
            background: #222;
            width: 8vw;
            height: 10vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2vw;
            font-weight: bold;
            z-index: 2;
            border: 2px solid #666;
            margin: 0 -10px;
        }

        /* Centro: Gols e Logos */
        .main-content {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            flex: 1;
            padding: 0 2vw;
        }

        .logo-side { width: 15vw; display: flex; justify-content: center; }
        .logo-img { max-width: 100%; max-height: 25vh; object-fit: contain; }

        .score-container {
            display: flex;
            align-items: center;
            gap: 10vw;
            background: rgba(10, 20, 40, 0.6);
            padding: 2vh 5vw;
            border-radius: 20px;
        }

        .score-num {
            font-family: 'Digital-7';
            font-size: 25vw;
            color: #81d4fa;
            line-height: 0.8;
            text-shadow: 0 0 20px rgba(129, 212, 250, 0.5);
        }

        /* Rodapé: Faltas e Tempo */
        .bottom-bar {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 1vh 3vw;
            border-radius: 20px 20px 0 0;
            border: 1px solid #333;
        }

        .foul-box { text-align: center; }
        .foul-val { font-family: 'Digital-7'; font-size: 8vw; color: #ffff00; line-height: 1; }
        .foul-label { font-size: 1vw; text-transform: uppercase; color: #888; }
        
        .timer-container { text-align: center; }
        #timer { font-family: 'Digital-7'; font-size: 10vw; color: #ff3d00; line-height: 1; }
        #periodo { font-size: 1.5vw; font-weight: bold; }

        /* REGRAS PARA CELULAR (Telas Pequenas) */
        @media (max-width: 768px) {
            .champ-name { font-size: 3vw; }
            .name-box { font-size: 4vw; }
            .vs-box { font-size: 4vw; width: 12vw; }
            .score-num { font-size: 30vw; }
            .foul-label { font-size: 2.5vw; }
            #periodo { font-size: 3vw; }
            .logo-side { display: none; } /* Esconde logos no celular para sobrar espaço pros gols */
        }

        footer { font-size: 10px; color: #333; padding: 2px; }
    </style>
</head>
<body id="bg">
    <div class="top-bar">
        <div class="champ-name" id="campeonato">CARREGANDO...</div>
        <div class="teams-header">
            <div class="name-box home-box" id="name1">CASA</div>
            <div class="vs-box">VS</div>
            <div class="name-box away-box" id="name2">VISITANTE</div>
        </div>
    </div>

    <div class="main-content">
        <div class="logo-side"><img id="logo1" class="logo-img" src="" onerror="this.style.visibility='hidden'"></div>
        
        <div class="score-container">
            <div class="score-num" id="score1">00</div>
            <div class="score-num" id="score2">00</div>
        </div>

        <div class="logo-side"><img id="logo2" class="logo-img" src="" onerror="this.style.visibility='hidden'"></div>
    </div>

    <div class="bottom-bar">
        <div class="foul-box">
            <div class="foul-val" id="fouls1">0</div>
            <div class="foul-label">Faltas</div>
        </div>

        <div class="timer-container">
            <div id="periodo">1º TEMPO</div>
            <div id="timer">00:00</div>
        </div>

        <div class="foul-box">
            <div class="foul-val" id="fouls2">0</div>
            <div class="foul-label">Faltas</div>
        </div>
    </div>

    <footer>By: An.Yoshi - 2026</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXAqDh68HlF2YWOr8wz_bSuv1ILytBppo",
            authDomain: "placar-kendence.firebaseapp.com",
            projectId: "placar-kendence",
            databaseURL: "https://placar-kendence-default-rtdb.firebaseio.com",
            storageBucket: "placar-kendence.firebasestorage.app",
            messagingSenderId: "533821445617",
            appId: "1:533821445617:web:0b62bce2a3fcdd3a3a2050"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const placarRef = ref(db, 'placar/');

        onValue(placarRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('timer').innerText = data.timer || "00:00";
                document.getElementById('periodo').innerText = data.periodo || "1º TEMPO";
                document.getElementById('name1').innerText = data.name1 || "CASA";
                document.getElementById('name2').innerText = data.name2 || "VISITANTE";
                document.getElementById('score1').innerText = (data.score1 || 0).toString().padStart(2, '0');
                document.getElementById('score2').innerText = (data.score2 || 0).toString().padStart(2, '0');
                document.getElementById('fouls1').innerText = data.fouls1 || "0";
                document.getElementById('fouls2').innerText = data.fouls2 || "0";
                document.getElementById('campeonato').innerText = data.campeonato || "CAMPEONATO";
                document.getElementById('logo1').src = data.logo1 || "";
                document.getElementById('logo2').src = data.logo2 || "";
                if(data.bg) document.body.style.backgroundImage = `url(${data.bg})`;
            }
        });
    </script>
</body>
</html>
