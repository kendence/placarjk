<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Placar - Kendence F.C.</title>
    <style>
         @font-face {
           font-family: 'SportsSegment';
           src: url('https://fonts.cdnfonts.com/s/14352/Digital7-rg18.woff') format('woff');
          }
        body {
            margin: 0; padding: 0;
            background-color: black;
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: space-between;
        }
        .header { display: flex; width: 100%; justify-content: center; position: relative; padding-top: 20px; }
        #timer { font-family: 'Digital'; font-size: 120px; color: #ff0000; }
        #periodo { position: absolute; right: 50px; top: 30px; font-size: 40px; color: white; }

        .scoreboard { display: flex; width: 90%; justify-content: space-around; align-items: center; flex-grow: 1; }
        .team { text-align: center; width: 40%; }
        .shield { width: 150px; height: 150px; object-fit: contain; margin-bottom: 10px; }
        .team-name { font-size: 50px; text-transform: uppercase; margin-bottom: 20px; }
.score { 
    font-family: 'SportsSegment', 'Arial', sans-serif; 
    font-size: 200px; 
    color: #00ff00; 
    line-height: 1; 
    
    /* --- ADICIONE ESTA LINHA PARA EFEITO DE BRILHO LED --- */
    text-shadow: 0 0 10px rgba(0, 255, 0, 0.7); 
    /* ---------------------------------------------------- */
}

        .vs { font-size: 100px; color: white; }

        .fouls-section { text-align: center; margin-bottom: 20px; }
        .fouls-label { font-size: 30px; display: block; margin-bottom: 5px; }
        .fouls-container { display: flex; align-items: center; justify-content: center; gap: 40px; }
        .foul-count { font-family: 'Digital'; font-size: 150px; color: #ffff00; }
        .vs-small { font-size: 80px; }

        footer { font-size: 18px; padding-bottom: 10px; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body id="bg">
    <div class="header">
        <div id="timer">00:00</div>
        <div id="periodo">1st</div>
    </div>

    <div class="scoreboard">
        <div class="team">
            <img id="logo1" src="" class="shield" onerror="this.style.display='none'">
            <div id="name1" class="team-name">Time 1</div>
            <div id="score1" class="score">0</div>
        </div>

        <div class="vs">X</div>

        <div class="team">
            <img id="logo2" src="" class="shield" onerror="this.style.display='none'">
            <div id="name2" class="team-name">Time 2</div>
            <div id="score2" class="score">0</div>
        </div>
    </div>

    <div class="fouls-section">
        <span class="fouls-label">FALTAS</span>
        <div class="fouls-container">
            <div id="fouls1" class="foul-count">0</div>
            <div class="vs-small">X</div>
            <div id="fouls2" class="foul-count">0</div>
        </div>
    </div>

    <footer>By: An.Yoshi - 2026</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXAqDh68HlF2YWOr8wz_bSuv1ILytBppo",
            authDomain: "placar-kendence.firebaseapp.com",
            projectId: "placar-kendence",
            databaseURL: "https://placar-kendence-default-rtdb.firebaseio.com", // Verifique se esta é sua URL correta
            storageBucket: "placar-kendence.firebasestorage.app",
            messagingSenderId: "533821445617",
            appId: "1:533821445617:web:0b62bce2a3fcdd3a3a2050"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const placarRef = ref(db, 'placar/');

        onValue(placarRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('timer').innerText = data.timer || "00:00";
                document.getElementById('periodo').innerText = data.periodo || "1st";
                document.getElementById('name1').innerText = data.name1 || "Time 1";
                document.getElementById('name2').innerText = data.name2 || "Time 2";
                document.getElementById('score1').innerText = data.score1 || "0";
                document.getElementById('score2').innerText = data.score2 || "0";
                document.getElementById('fouls1').innerText = data.fouls1 || "0";
                document.getElementById('fouls2').innerText = data.fouls2 || "0";
                document.getElementById('logo1').src = data.logo1 || "";
                document.getElementById('logo2').src = data.logo2 || "";
                document.getElementById('logo1').style.display = data.logo1 ? 'inline' : 'none';
                document.getElementById('logo2').style.display = data.logo2 ? 'inline' : 'none';
                document.getElementById('bg').style.backgroundImage = data.bg ? `url(${data.bg})` : 'none';
            }
        });
    </script>
</body>
</html>
